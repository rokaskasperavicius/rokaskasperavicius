fragment Record on RecordInterface {
  _createdAt
  _firstPublishedAt
  _isValid
  _modelApiKey
  _publishedAt
  _seoMetaTags {
    attributes
    content
    tag
  }
  _updatedAt
  id
}

fragment ResponsiveImage on ResponsiveImage {
  srcSet
  webpSrcSet
  sizes
  src
  width
  height
  aspectRatio
  alt
  title
  base64
}

fragment FileField on FileField {
  _createdAt
  _updatedAt
  basename
  colors {
    alpha
    blue
    cssRgb
    green
    hex
    red
  }
  customData
  exifInfo
  filename
  format
  id
  md5
  mimeType
  size
  smartTags
  tags
  url
  responsiveImage(
    imgixParams: { fit: crop, w: 2560, h: 1440, auto: format }
  ) {
    ...ResponsiveImage
  }
}

fragment TechnologiesRecord on TechnologyRecord {
  ...Record
  createdAt
  title
  updatedAt
}

fragment ExperienceRecord on ExperienceRecord {
  ...Record
  createdAt
  date
  updatedAt
  description {
    blocks
    inlineBlocks
    value
    links
  }
  title {
    blocks
    inlineBlocks
    value
    links
  }
}

fragment ProjectRecord on ProjectRecord {
  ...Record
  updatedAt
  createdAt
  slug
  title
  description {
    blocks
    inlineBlocks
    value
    links
  }
  githubPrimaryUrl
  githubSecondaryUrl
  technologies {
    ...TechnologiesRecord
  }
  cover {
    ...FileField
  }
  images {
    ...FileField
  }
}
