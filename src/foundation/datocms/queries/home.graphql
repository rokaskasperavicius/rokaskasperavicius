query HomePage {
  homePage {
    featuredProject {
      ...ProjectRecord
    }

    aboutHeading
    aboutDescription {
      blocks
      inlineBlocks
      value
      links
    }
    aboutImage {
      responsiveImage(imgixParams: { fit: crop, w: 250, auto: format }) {
        ...ResponsiveImage
      }
    }

    technologiesHeading
    technologies {
      ...TechnologiesRecord
    }

    experiencesHeading
    experiences {
      ...ExperienceRecord
    }
    receivingEmail
  }
}
